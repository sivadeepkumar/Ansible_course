- name: data types
  hosts: local
  connection: local
  vars: 
    ProgrammingLanguage: "Python" # string data type 
    Version: 3 # integer data type 
    is_active: true # boolean data type 
    Price: 1000.00 # float data type 
    Skills: # list data type 
    - "Python"
    - "JavaScript"
    Address: # map/dictionary data type 
      FlatNo: 101
      Street: "123 Main St"
      City: "New York"
      State: "NY"
  tasks:
    - name: print data types
      ansible.builtin.debug:
        msg: |
        Program : {{ ProgrammingLanguage }}
        Version : {{ Version }}
        is_active : {{ is_active }}
        Price : {{ Price }}
        Skills : {{ Skills }}
        Address : {{ Address }}