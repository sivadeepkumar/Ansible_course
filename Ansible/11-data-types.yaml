- name: data types
  hosts: localhost
  connection: local

  vars: 
    ProgrammingLanguage: "Python"   # string
    Version: 3                  # number
    is_active: true               # boolean
    Price: 1000.00                # float
    Skills:                       # list
      - "Python"
      - "JavaScript"
    Address:                      # dictionary
      FlatNo: 101
      Street: "123 Main St"
      City: "New York"
      State: "NY"

  tasks:
    - name: print data types
      ansible.builtin.debug:
        msg: |
          Program : {{ ProgrammingLanguage }}
          Version : {{ Version }}
          is_active : {{ is_active }}
          Price : {{ Price }}
          Skills : {{ Skills }}
          Address : {{ Address }}